services:
  mariadb:
    image: mariadb:10.11
    container_name: api-go-mariadb
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    restart: unless-stopped
    # O healthcheck avisa ao Docker quando o banco realmente terminou de ligar
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: api-go-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      mariadb:
        condition: service_healthy # Só sobe a API quando o banco estiver 100% pronto
    restart: unless-stopped

volumes:
  mariadb_data:
